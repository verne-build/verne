name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (none = rebuild & republish current version)"
        type: choice
        options: [patch, minor, major, none]
        default: patch
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  gate:
    name: Approve & version
    runs-on: ubuntu-latest
    environment: release
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.bump }}" != "none" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            TAG=$(npm version ${{ inputs.bump }} -m "chore(release): %s" | tail -1)
            git push origin "HEAD:${{ github.ref_name }}" --follow-tags
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # bump=none: rebuild & republish the current package.json version, no new tag
            TAG="v$(node -p "require('./package.json').version")"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing $TAG"

  build:
    name: Build ${{ matrix.arch }}
    needs: gate
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: arm64, runner: macos-15 }
          - { arch: x64,   runner: macos-15-intel }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.tag }}
      - uses: pnpm/action-setup@v4
        with: { version: 11 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: "daemon -> daemon/target" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm bundle:install
      - run: cargo build --release --manifest-path daemon/Cargo.toml
      - run: pnpm exec electron-vite build
      - name: Check signing secrets present
        env:
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
        run: |
          : "${CSC_LINK:?MAC_CERTIFICATE missing — add signing secrets to the 'release' environment}"
          : "${APPLE_API_KEY_B64:?APPLE_API_KEY_B64 missing — add notarization secrets to the 'release' environment}"
      - name: Build, sign & notarize
        env:
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          echo "${{ secrets.APPLE_API_KEY_B64 }}" | base64 -d > "$RUNNER_TEMP/AuthKey.p8"
          export APPLE_API_KEY="$RUNNER_TEMP/AuthKey.p8"
          pnpm exec electron-builder --mac --${{ matrix.arch }} --publish never
      - name: Verify update manifest was generated
        run: test -f release/latest-mac.yml || (echo "::error::latest-mac.yml missing — electron-updater needs it"; exit 1)
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*-mac.zip
            release/*.blockmap
            release/latest-mac.yml
          retention-days: 14
          if-no-files-found: error

  publish:
    name: Publish release
    needs: [gate, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.gate.outputs.tag }}
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: dist-*
      - name: Merge mac update manifests
        env:
          JS_YAML_DIR: ${{ runner.temp }}/tools
        run: |
          mkdir -p out
          cp artifacts/dist-*/*.dmg artifacts/dist-*/*-mac.zip artifacts/dist-*/*.blockmap out/ 2>/dev/null || true
          # Install js-yaml in an isolated dir so npm never resolves the project's
          # deps (npm ignores pnpm peerDependencyRules -> ERESOLVE) or runs postinstall.
          mkdir -p "$JS_YAML_DIR"
          echo '{"name":"tools","private":true}' > "$JS_YAML_DIR/package.json"
          npm install --prefix "$JS_YAML_DIR" --no-audit --no-fund js-yaml
          test -d "$JS_YAML_DIR/node_modules/js-yaml" || { echo "::error::js-yaml not installed at $JS_YAML_DIR"; exit 1; }
          node scripts/merge-mac-manifests.mjs out/latest-mac.yml \
            artifacts/dist-arm64/latest-mac.yml artifacts/dist-x64/latest-mac.yml
          ls -la out
      - name: Generate release notes
        run: |
          TAG="${{ needs.gate.outputs.tag }}"
          PREV=$(git tag -l 'v*' --sort=-v:refname | grep -vx "$TAG" | head -1)
          RANGE=$([ -n "$PREV" ] && echo "$PREV..$TAG" || echo "$TAG")
          { echo "## Changes"; git log --pretty='- %s' "$RANGE"; } > notes.md
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.gate.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" out/* --clobber
            gh release edit "$TAG" --notes-file notes.md
          else
            gh release create "$TAG" out/* --title "$TAG" --notes-file notes.md
          fi
